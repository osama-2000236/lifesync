# .github/workflows/ci.yml
# ============================================
# LifeSync CI Pipeline
# Runs on: push to main/develop, all PRs
# Steps: Install → Test (75 tests) → Build
# ============================================

name: LifeSync CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ───
  test-backend:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create test .env
        run: |
          cp .env.example .env
          echo "NODE_ENV=test" >> .env
          echo "JWT_SECRET=test_jwt_secret_for_ci_pipeline_32ch" >> .env
          echo "JWT_REFRESH_SECRET=test_refresh_secret_for_ci_pipe" >> .env
          echo "ENCRYPTION_KEY=test_encryption_key_for_ci_32ch!" >> .env

      - name: Run Jest tests
        run: npm test -- --forceExit --detectOpenHandles
        env:
          NODE_ENV: test

      - name: Test results summary
        if: always()
        run: echo "✅ Backend test suite completed"

  # ─── Frontend Build ───
  build-frontend:
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci

      - name: Build frontend
        working-directory: ./client
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Verify build output
        working-directory: ./client
        run: |
          ls -la dist/
          test -f dist/index.html && echo "✅ Build successful" || exit 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: client/dist/
          retention-days: 7

  # ─── Docker Build Validation ───
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t lifesync-server:ci .

      - name: Build frontend image
        working-directory: ./client
        run: docker build -t lifesync-client:ci .

      - name: Verify images
        run: |
          docker images | grep lifesync
          echo "✅ Docker images built successfully"
