# .github/workflows/ci.yml
# LifeSync CI: backend Jest, MySQL e2e, Python unit, client Vitest+build, Docker (main).
# Not in CI (needs live services / secrets): Playwright UI e2e, test:qa:api,
# test:eval:voice (BERT/ONNX runtime), production release-smoke.

name: LifeSync CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ───
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create test .env
        run: |
          cp .env.example .env
          echo "NODE_ENV=test" >> .env
          echo "DB_DIALECT=sqlite" >> .env
          echo "DB_STORAGE=:memory:" >> .env
          echo "JWT_SECRET=test_jwt_secret_for_ci_pipeline_32ch" >> .env
          echo "JWT_REFRESH_SECRET=test_refresh_secret_for_ci_pipe" >> .env
          echo "ENCRYPTION_KEY=test_encryption_key_for_ci_32ch!" >> .env

      # forceExit is also set in jest.config.js — detectOpenHandles logs leaks
      # without masking failures. Prefer fixing open handles over relying on exit.
      - name: Run Jest tests
        run: npm test -- --detectOpenHandles
        env:
          NODE_ENV: test
          DB_DIALECT: sqlite
          JWT_SECRET: test_jwt_secret_for_ci_pipeline_32ch
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci_pipe
          ENCRYPTION_KEY: test_encryption_key_for_ci_32ch!

  # ─── Eval suites (pure Jest — no live model / GPU required) ───
  test-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Create test .env
        run: |
          cp .env.example .env
          echo "NODE_ENV=test" >> .env
          echo "JWT_SECRET=test_jwt_secret_for_ci_pipeline_32ch" >> .env
          echo "JWT_REFRESH_SECRET=test_refresh_secret_for_ci_pipe" >> .env
          echo "ENCRYPTION_KEY=test_encryption_key_for_ci_32ch!" >> .env
      - name: Track B + insight evals
        run: |
          npm run test:eval:trackb
          npm run test:eval:insight
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_for_ci_pipeline_32ch
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci_pipe
          ENCRYPTION_KEY: test_encryption_key_for_ci_32ch!

  # ─── Python model service unit tests (no weights) ───
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: model_runtime request validation
        working-directory: model_runtime
        run: python -m unittest test_request_validation.py -v
      - name: hf_space infer limit helpers
        working-directory: hf_space
        run: python -m unittest test_infer_limits.py -v

  # ─── Backend MySQL E2E ───
  e2e-mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: lifesync_test
          MYSQL_USER: lifesync
          MYSQL_PASSWORD: lifesync_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create test .env
        run: |
          cp .env.example .env
          echo "NODE_ENV=test" >> .env
          echo "DB_DIALECT=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_NAME=lifesync_test" >> .env
          echo "DB_USER=lifesync" >> .env
          echo "DB_PASSWORD=lifesync_pass" >> .env
          echo "JWT_SECRET=test_jwt_secret_for_ci_pipeline_32ch" >> .env
          echo "JWT_REFRESH_SECRET=test_refresh_secret_for_ci_pipe" >> .env
          echo "ENCRYPTION_KEY=test_encryption_key_for_ci_32ch!" >> .env

      - name: Wait for MySQL
        run: npm run db:wait
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: lifesync_test
          DB_USER: lifesync
          DB_PASSWORD: lifesync_pass

      - name: Run DB migrations
        run: npx sequelize-cli db:migrate --env development
        env:
          DB_DIALECT: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: lifesync_test
          DB_USER: lifesync
          DB_PASSWORD: lifesync_pass

      - name: Run MySQL E2E suite
        run: npm run test:e2e:mysql
        env:
          NODE_ENV: test
          RUN_DB_E2E: true
          DB_DIALECT: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: lifesync_test
          DB_USER: lifesync
          DB_PASSWORD: lifesync_pass
          JWT_SECRET: test_jwt_secret_for_ci_pipeline_32ch
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci_pipe
          ENCRYPTION_KEY: test_encryption_key_for_ci_32ch!

  # ─── Frontend Build ───
  build-frontend:
    runs-on: ubuntu-latest
    needs: [test-backend, e2e-mysql, test-eval, test-python]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint frontend
        working-directory: ./client
        run: npm run lint

      - name: Test frontend (Vitest)
        working-directory: ./client
        run: npm test

      - name: Build frontend
        working-directory: ./client
        run: npm run build
        env:
          VITE_API_URL: https://lifesync-production-fdf9.up.railway.app/api
          VITE_GOOGLE_CLIENT_ID: 190237143688-0ddtrdq3die8hnce0aqbti3jgc2eam4g.apps.googleusercontent.com
          EXPECTED_VITE_API_URL: https://lifesync-production-fdf9.up.railway.app/api
          EXPECTED_VITE_GOOGLE_CLIENT_ID: 190237143688-0ddtrdq3die8hnce0aqbti3jgc2eam4g.apps.googleusercontent.com

      - name: Verify build output
        working-directory: ./client
        run: |
          ls -la dist/
          test -f dist/index.html && echo "✅ Build successful" || exit 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: client/dist/
          retention-days: 7

  # ─── Docker Build Validation ───
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, e2e-mysql, build-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t lifesync-server:ci .

      - name: Build frontend image
        working-directory: ./client
        run: docker build -t lifesync-client:ci .

      - name: Verify images
        run: |
          docker images | grep lifesync
          echo "✅ Docker images built successfully"
