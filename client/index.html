<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>LifeSync</title>
    <meta name="description" content="LifeSync — cross-domain daily assistant: health + money in one chat. مساعدك اليومي الذي يربط صحتك بمالك." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#059669" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LifeSync" />
    <script>
      // Pre-paint theme + direction from saved settings (avoids flash). Kept in
      // sync by SettingsContext after React mounts.
      (function () {
        try {
          var t = localStorage.getItem('lifesync.theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          var l = localStorage.getItem('lifesync.locale');
          if (l !== 'ar' && l !== 'en') {
            var langs = navigator.languages || [navigator.language || ''];
            l = langs.some(function (x) { return x && x.toLowerCase().indexOf('ar') === 0; }) ? 'ar' : 'en';
          }
          var r = document.documentElement;
          if (t === 'dark') r.classList.add('dark');
          r.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
          r.setAttribute('lang', l);
          r.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
