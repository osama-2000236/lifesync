# docker-compose.yml
# ============================================
# LifeSync Full Stack — Docker Compose
# Services: MySQL, Node.js API, React/Nginx
# ============================================

version: "3.9"

services:
  # ─── MySQL Database ───
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-lifesync_root_2025}
      MYSQL_DATABASE: ${DB_NAME:-lifesync_db}
      MYSQL_USER: ${DB_USER:-lifesync}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lifesync_pass_2025}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-lifesync_root_2025}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lifesync-net

  # ─── Local BERT NLP Service (intent + classification + entities) ───
  bert:
    build:
      context: ./bert_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BERT_SERVICE_PORT: 8088
      BERT_EAGER_LOAD: ${BERT_EAGER_LOAD:-1}
      HF_HOME: /models/hf
    ports:
      - "8088:8088"
    volumes:
      - bert_models:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8088/health').status==200 else 1)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - lifesync-net

  # ─── Node.js Backend API ───
  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      bert:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-lifesync_db}
      DB_USER: ${DB_USER:-lifesync}
      DB_PASSWORD: ${DB_PASSWORD:-lifesync_pass_2025}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_at_least_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_also_32_chars}
      AI_PROVIDER: ${AI_PROVIDER:-bert}
      CHAT_AI_PROVIDER: ${CHAT_AI_PROVIDER:-bert}
      INSIGHTS_AI_PROVIDER: ${INSIGHTS_AI_PROVIDER:-bert}
      BERT_SERVICE_URL: http://bert:8088
      BERT_STRICT: ${BERT_STRICT:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-lifesync_encryption_key_32chars!}
      CORS_ORIGIN: http://localhost,http://localhost:80
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost}
    ports:
      - "5001:5000"
    networks:
      - lifesync-net

  # ─── React Frontend (Nginx) ───
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
    networks:
      - lifesync-net

  # ─── Ollama LLM Engine ───
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - lifesync-net
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma}
    # Override the default entrypoint ("/bin/ollama") to use a shell
    entrypoint: /bin/sh
    # Run the server in the background, wait 5s for it to start, pull the model automatically, and wait for server to keep the container alive.
    command: -c "ollama serve & sleep 5 && ollama pull $${OLLAMA_MODEL:-gemma} && wait"

volumes:
  mysql_data:
    driver: local
  ollama_data:
    driver: local
  bert_models:
    driver: local

networks:
  lifesync-net:
    driver: bridge
