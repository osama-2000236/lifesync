# docker-compose.yml
# ============================================
# LifeSync Full Stack — Docker Compose
# Services: MySQL, Node.js API, React/Nginx
# ============================================

version: "3.9"

services:
  # ─── MySQL Database ───
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-lifesync_root_2025}
      MYSQL_DATABASE: ${DB_NAME:-lifesync_db}
      MYSQL_USER: ${DB_USER:-lifesync}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lifesync_pass_2025}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-lifesync_root_2025}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lifesync-net

  # ─── Node.js Backend API ───
  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-lifesync_db}
      DB_USER: ${DB_USER:-lifesync}
      DB_PASSWORD: ${DB_PASSWORD:-lifesync_pass_2025}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_at_least_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_also_32_chars}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-lifesync_encryption_key_32chars!}
      CORS_ORIGIN: http://localhost,http://localhost:80
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost}
    ports:
      - "5000:5000"
    networks:
      - lifesync-net

  # ─── React Frontend (Nginx) ───
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
    networks:
      - lifesync-net

volumes:
  mysql_data:
    driver: local

networks:
  lifesync-net:
    driver: bridge
