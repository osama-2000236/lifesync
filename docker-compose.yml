# docker-compose.yml
# ============================================
# LifeSync Full Stack — Docker Compose
# Services: MySQL, Node.js API, React/Nginx
# ============================================

version: "3.9"

services:
  # ─── MySQL Database ───
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-lifesync_root_2025}
      MYSQL_DATABASE: ${DB_NAME:-lifesync_db}
      MYSQL_USER: ${DB_USER:-lifesync}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lifesync_pass_2025}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Do NOT mount server/migrations here — they are Sequelize JS, not SQL.
      # Schema comes from `npm run migrate` (or server sync) against this DB.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-lifesync_root_2025}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lifesync-net

  # ─── Node.js Backend API ───
  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      NODE_ENV: ${LIFESYNC_ENV:-development}
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-lifesync_db}
      DB_USER: ${DB_USER:-lifesync}
      DB_PASSWORD: ${DB_PASSWORD:-lifesync_pass_2025}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_at_least_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_also_32_chars}
      AI_PROVIDER: ${DOCKER_CHAT_AI_PROVIDER:-ollama}
      CHAT_AI_PROVIDER: ${DOCKER_CHAT_AI_PROVIDER:-ollama}
      INSIGHTS_AI_PROVIDER: ${DOCKER_INSIGHTS_AI_PROVIDER:-ollama}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:1b}
      OLLAMA_API_BASE_URL: http://ollama:11434/v1/chat/completions
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-lifesync_encryption_key_32chars!}
      CORS_ORIGIN: http://localhost,http://localhost:80
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost}
      # Empty by default → in-memory ephemeral state. To use the optional redis
      # service below, start with `--profile redis` and set REDIS_URL=redis://redis:6379
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - "5001:5000"
    # Migrate then seed then serve — sequelize migrations are JS, not docker init SQL.
    command: sh -c "npx sequelize-cli db:migrate --env development && node server/seeders/seed.js && node server/app.js"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - lifesync-net

  # ─── React Frontend (Nginx) ───
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - lifesync-net

  # ─── Ollama LLM Engine ───
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - lifesync-net
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:1b}
    # Override the default entrypoint ("/bin/ollama") to use a shell
    entrypoint: /bin/sh
    # Run the server in the background, wait 5s for it to start, pull the model automatically, and wait for server to keep the container alive.
    command: -c "ollama serve & sleep 5 && ollama pull $${OLLAMA_MODEL:-gemma3:1b} && wait"

  # ─── Redis (optional) — shared/durable OTP + clarification + interview state ───
  # Opt in with:  docker compose --profile redis up
  # then set REDIS_URL=redis://redis:6379 (server picks it up automatically).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["redis"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lifesync-net

volumes:
  mysql_data:
    driver: local
  ollama_data:
    driver: local
  redis_data:
    driver: local

networks:
  lifesync-net:
    driver: bridge
